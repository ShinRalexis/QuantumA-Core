name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  functional-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # NumPy basta per la suite funzionale: i runner non hanno GPU, quindi
        # il simulatore gira sul backend CPU (PyTorch e' opzionale).
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Run functional check (35 tests, CPU backend)
        run: python run_check.py
